<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Viral Boost - Wallet System</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        body { font-family: 'Segoe UI', sans-serif; background: #0f172a; color: white; display: flex; flex-direction: column; align-items: center; padding: 10px; margin: 0; }
        .card { background: #1e293b; padding: 20px; border-radius: 15px; width: 100%; max-width: 400px; border: 1px solid #334155; margin-bottom: 20px; }
        .wallet-box { background: linear-gradient(135deg, #0ea5e9, #2563eb); padding: 15px; border-radius: 12px; text-align: center; margin-bottom: 20px; }
        h3 { margin: 5px 0; }
        input, select { width: 100%; padding: 12px; border-radius: 8px; border: 1px solid #334155; background: #0f172a; color: white; margin-bottom: 10px; box-sizing: border-box; }
        .btn { width: 100%; padding: 12px; border-radius: 8px; border: none; font-weight: bold; cursor: pointer; margin-top: 5px; }
        .btn-check { background: #38bdf8; color: #0f172a; }
        .btn-order { background: #22c55e; color: white; }
        #order-section { display: none; }
    </style>
</head>
<body>

<div class="card">
    <div class="wallet-box">
        <p style="font-size: 14px; opacity: 0.9;">My Wallet Balance</p>
        <h2 id="dispBalance">₹0.00</h2>
        <p id="dispUser" style="font-size: 12px;"></p>
    </div>

    <label>Mobile Number (User ID):</label>
    <input type="number" id="userID" placeholder="ID daalein (Ex: 7388...)">
    <button class="btn btn-check" onclick="checkBalance()">Login / Refresh Balance</button>
</div>

<div class="card" id="order-section">
    <h3>🛒 Create Order</h3>
    <label>Insta Link:</label>
    <input type="text" id="targetLink" placeholder="Link yahan paste karein...">

    <label>Service:</label>
    <select id="mainService">
        <option value="1|Views: 1,000">1,000 Views - ₹1</option>
        <option value="30|Followers: 1k">1,000 Followers - ₹30</option>
        <option value="45|Followers(10%Drop): 1k">1,000 Followers (10% Drop) - ₹45</option>
    </select>

    <button class="btn btn-order" id="orderBtn" onclick="placeOrder()">Buy Now (Wallet)</button>
    <p style="font-size: 11px; color: #94a3b8; text-align: center; margin-top: 10px;">Paisa wallet se kat jayega.</p>
</div>

<script>
    const scriptURL = 'YOUR_NEW_DEPLOY_URL_HERE'; // Naya URL yahan daalein
    let currentBalance = 0;

    async function checkBalance() {
        let id = document.getElementById("userID").value;
        if(id.length < 10) { alert("Sahi Mobile No. daalo!"); return; }
        
        document.getElementById("dispBalance").innerText = "Loading...";
        
        try {
            let response = await fetch(scriptURL, {
                method: 'POST',
                body: JSON.stringify({ action: "checkBalance", userID: id })
            });
            let result = await response.json();
            currentBalance = result.balance;
            document.getElementById("dispBalance").innerText = "₹" + currentBalance;
            document.getElementById("dispUser").innerText = "User ID: " + id;
            document.getElementById("order-section").style.display = "block";
        } catch(e) { alert("Error! ID nahi mili."); }
    }

    async function placeOrder() {
        let valData = document.getElementById("mainService").value.split('|');
        let price = parseInt(valData[0]);
        let service = valData[1];
        let id = document.getElementById("userID").value;
        let link = document.getElementById("targetLink").value;

        if(currentBalance < price) { alert("Paisa kam hai! Recharge karein."); return; }
        if(link == "") { alert("Link daalein!"); return; }

        document.getElementById("orderBtn").innerText = "Processing...";
        
        try {
            await fetch(scriptURL, {
                method: 'POST',
                body: JSON.stringify({ action: "placeOrder", userID: id, amount: price, service: service, link: link })
            });
            alert("Order Success! Paisa wallet se kat gaya.");
            checkBalance(); // Balance update
        } catch(e) { alert("Order Failed!"); }
    }
</script>
</body>
</html>
